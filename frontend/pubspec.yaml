name: jp_grammar_analyzer
description: Real-time Japanese grammar analyzer for Galgame
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.0
  provider: ^6.1.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.0
  flutter_acrylic: ^1.1.4
  flutter_markdown: ^0.7.7+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: LXGWWenKaiScreen
      fonts:
        - asset: assets/fonts/LXGWWenKaiScreen.ttf
    - family: KleeOne
      fonts:
        - asset: assets/fonts/KleeOne-Regular.ttf
          weight: 400
